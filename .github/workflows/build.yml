name: Build Velocity Windows

"on":
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout do seu repo
        uses: actions/checkout@v4
        with:
          path: mods

      - name: Clonar projeto original Velocity
        run: git clone https://github.com/gualdimar/velocity velocity-src

      - name: Substituir packageviewer.cpp modificado
        run: copy mods\packageviewer.cpp velocity-src\Velocity\packageviewer.cpp
        shell: cmd

      - name: Instalar Qt 5.15
        uses: jurplel/install-qt-action@v3
        with:
          version: '5.15.2'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_mingw81'

      - name: Compilar o projeto
        shell: cmd
        run: |
          cd velocity-src\Velocity
          qmake Velocity.pro -spec win32-g++ CONFIG+=release
          mingw32-make -j4

      - name: Copiar DLLs com windeployqt
        shell: cmd
        run: |
          mkdir deploy
          copy velocity-src\Velocity\release\Velocity.exe deploy\
          windeployqt --release --no-translations deploy\Velocity.exe

      - name: Empacotar em ZIP
        shell: pwsh
        run: Compress-Archive -Path deploy\* -DestinationPath Velocity-Windows.zip

      - name: Upload do executável
        uses: actions/upload-artifact@v4
        with:
          name: Velocity-Windows
          path: Velocity-Windows.zip
          retention-days: 30
