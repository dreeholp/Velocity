name: Build Velocity Windows

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Instalar Qt 5.15
        uses: jurplel/install-qt-action@v3
        with:
          version: '5.15.2'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_mingw81'
          modules: ''

      - name: Compilar o projeto
        shell: cmd
        run: |
          qmake Velocity/Velocity.pro -spec win32-g++ CONFIG+=release
          mingw32-make -j4

      - name: Copiar DLLs com windeployqt
        shell: cmd
        run: |
          mkdir deploy
          copy release\Velocity.exe deploy\
          windeployqt --release --no-translations deploy\Velocity.exe

      - name: Empacotar em ZIP
        shell: pwsh
        run: |
          Compress-Archive -Path deploy\* -DestinationPath Velocity-Windows.zip

      - name: Upload do executável
        uses: actions/upload-artifact@v4
        with:
          name: Velocity-Windows
          path: Velocity-Windows.zip
          retention-days: 30
